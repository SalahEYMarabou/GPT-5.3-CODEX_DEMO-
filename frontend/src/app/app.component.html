<router-outlet *ngIf="isSignInRoute"></router-outlet>

<div class="app-shell" *ngIf="!isSignInRoute">
  <aside class="sidebar">
    <h2>Timesheet</h2>
    <a routerLink="/employee/weekly" routerLinkActive="active"
      >Employee Weekly</a
    >
    <a routerLink="/employee/history" routerLinkActive="active"
      >Employee History</a
    >
    <a *ngIf="isAdmin" routerLink="/admin/dashboard" routerLinkActive="active"
      >Admin Dashboard</a
    >
    <span *ngIf="!isAdmin" class="nav-locked" title="Accès admin requis"
      >🔒 Admin Dashboard</span
    >

    <a *ngIf="isAdmin" routerLink="/admin/reports" routerLinkActive="active"
      >Reports</a
    >
    <span *ngIf="!isAdmin" class="nav-locked" title="Accès admin requis"
      >🔒 Reports</span
    >

    <a *ngIf="isAdmin" routerLink="/admin/metrics" routerLinkActive="active"
      >Metrics</a
    >
    <span *ngIf="!isAdmin" class="nav-locked" title="Accès admin requis"
      >🔒 Metrics</span
    >
  </aside>

  <main class="content-area">
    <header class="topbar">
      <div class="week-picker">
        <label for="week">Week selector</label>
        <input
          id="week"
          type="date"
          [ngModel]="selectedWeek()"
          (ngModelChange)="selectedWeek.set($event)"
        />
      </div>

      <div class="profile">
        <div>
          <strong>{{ authService.currentUser()?.name }}</strong>
          <small>{{ authService.currentUser()?.email }}</small>
          <span class="role-badge">{{ authService.currentUser()?.role }}</span>
        </div>
        <button (click)="logout()">Logout</button>
      </div>
    </header>

    <section class="page-content">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>

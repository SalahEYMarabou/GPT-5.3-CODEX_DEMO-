<router-outlet *ngIf="isSignInRoute"></router-outlet>

<div class="app-shell" *ngIf="!isSignInRoute">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-logo" aria-hidden="true">TS</span>
      <div>
        <h2>Timesheet</h2>
        <small>Workforce Portal</small>
      </div>
    </div>

    <a routerLink="/employee/weekly" routerLinkActive="active"
      ><span class="nav-icon" aria-hidden="true">📅</span>Employee Weekly</a
    >
    <a routerLink="/employee/history" routerLinkActive="active"
      ><span class="nav-icon" aria-hidden="true">🕘</span>Employee History</a
    >
    <a *ngIf="isAdmin" routerLink="/admin/dashboard" routerLinkActive="active"
      ><span class="nav-icon" aria-hidden="true">🛡️</span>Admin Dashboard</a
    >
    <span *ngIf="!isAdmin" class="nav-locked" title="Accès admin requis"
      ><span class="nav-icon" aria-hidden="true">🔒</span>Admin Dashboard</span
    >

    <a *ngIf="isAdmin" routerLink="/admin/reports" routerLinkActive="active"
      ><span class="nav-icon" aria-hidden="true">📄</span>Reports</a
    >
    <span *ngIf="!isAdmin" class="nav-locked" title="Accès admin requis"
      ><span class="nav-icon" aria-hidden="true">🔒</span>Reports</span
    >

    <a *ngIf="isAdmin" routerLink="/admin/metrics" routerLinkActive="active"
      ><span class="nav-icon" aria-hidden="true">📊</span>Metrics</a
    >
    <span *ngIf="!isAdmin" class="nav-locked" title="Accès admin requis"
      ><span class="nav-icon" aria-hidden="true">🔒</span>Metrics</span
    >
  </aside>

  <main class="content-area">
    <header class="topbar">
      <div class="week-picker">
        <label for="week"
          ><span aria-hidden="true">🗓️</span> Week selector</label
        >
        <input
          id="week"
          type="date"
          [ngModel]="selectedWeek()"
          (ngModelChange)="selectedWeek.set($event)"
        />
      </div>

      <div class="profile">
        <div>
          <strong
            ><span aria-hidden="true">👤</span>
            {{ authService.currentUser()?.name }}</strong
          >
          <small>{{ authService.currentUser()?.email }}</small>
          <span class="role-badge">{{ authService.currentUser()?.role }}</span>
        </div>
        <button (click)="logout()">
          <span aria-hidden="true">↩</span> Logout
        </button>
      </div>
    </header>

    <section class="page-content">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
